name: Build website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Build Pages output
        run: npm run build:docs

      - name: Verify committed Pages output
        run: git diff --exit-code docs
