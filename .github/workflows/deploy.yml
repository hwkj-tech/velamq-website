name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check Pages enablement
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          status=$(curl -sS -o "$RUNNER_TEMP/pages.json" -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status" = "404" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"

            if [ -n "$PAGES_TOKEN" ]; then
              echo "deploy=true" >> "$GITHUB_OUTPUT"
              echo "::notice title=GitHub Pages will be enabled::Using PAGES_TOKEN to enable Pages for this repository."
            else
              echo "deploy=false" >> "$GITHUB_OUTPUT"
              echo "::notice title=GitHub Pages is not enabled::Enable Pages in Settings > Pages and set Source to GitHub Actions, or add a PAGES_TOKEN secret with Pages write permission, then rerun this workflow."
            fi

            exit 0
          fi

          cat "$RUNNER_TEMP/pages.json"
          exit 1

      - name: Setup Pages
        if: steps.pages.outputs.deploy == 'true'
        uses: actions/configure-pages@v6
        with:
          enablement: ${{ steps.pages.outputs.enabled != 'true' }}
          token: ${{ secrets.PAGES_TOKEN || github.token }}

      - name: Deploy to GitHub Pages
        if: steps.pages.outputs.deploy == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
