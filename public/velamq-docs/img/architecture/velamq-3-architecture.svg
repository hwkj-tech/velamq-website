<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">VelaMQ 0.0.1 分层架构图</title>
  <desc id="desc">展示 VelaMQ 0.0.1 从设备接入、Broker 核心、管理控制到规则、存储、数据源、集群和观测系统的分层关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#eefcf8"/>
    </linearGradient>
    <linearGradient id="coreFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f4ff"/>
      <stop offset="1" stop-color="#ddf8f1"/>
    </linearGradient>
    <linearGradient id="apiFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf5ff"/>
      <stop offset="1" stop-color="#fff3d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#15324a" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#15324a" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1769aa"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: rgba(23,105,170,0.08); stroke-width: 1; }
      .frame { fill: rgba(255,255,255,0.72); stroke: rgba(23,105,170,0.2); stroke-width: 1.5; }
      .node { fill: rgba(255,255,255,0.9); stroke: rgba(23,105,170,0.22); stroke-width: 1.4; filter: url(#softShadow); }
      .core { fill: url(#coreFill); stroke: rgba(23,105,170,0.42); stroke-width: 1.8; filter: url(#shadow); }
      .api { fill: url(#apiFill); stroke: rgba(217,119,6,0.34); stroke-width: 1.8; filter: url(#shadow); }
      .support { fill: rgba(255,255,255,0.84); stroke: rgba(23,105,170,0.18); stroke-width: 1.2; }
      .storage { fill: rgba(236,253,245,0.88); stroke: rgba(22,163,74,0.28); stroke-width: 1.4; filter: url(#softShadow); }
      .external { fill: rgba(239,246,255,0.9); stroke: rgba(23,105,170,0.28); stroke-width: 1.4; filter: url(#softShadow); }
      .title { fill: #0f172a; font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .subtitle { fill: #52606d; font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .label { fill: #102a43; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .path { fill: #667085; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
      .body { fill: #344054; font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .tiny { fill: #667085; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .flow { stroke: #1769aa; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .flow-soft { stroke: rgba(23,105,170,0.44); stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .lane { stroke: rgba(23,105,170,0.14); stroke-width: 1; stroke-dasharray: 6 8; }
      .dot { fill: #1769aa; opacity: 0.95; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760" rx="28"/>
  <g opacity="0.8">
    <path class="grid" d="M80 140 H1200"/>
    <path class="grid" d="M80 240 H1200"/>
    <path class="grid" d="M80 340 H1200"/>
    <path class="grid" d="M80 440 H1200"/>
    <path class="grid" d="M80 540 H1200"/>
    <path class="grid" d="M80 640 H1200"/>
    <path class="grid" d="M180 96 V686"/>
    <path class="grid" d="M360 96 V686"/>
    <path class="grid" d="M540 96 V686"/>
    <path class="grid" d="M720 96 V686"/>
    <path class="grid" d="M900 96 V686"/>
    <path class="grid" d="M1080 96 V686"/>
  </g>

  <text class="title" x="68" y="64">VelaMQ 0.0.1 Architecture</text>
  <text class="subtitle" x="68" y="91">一体化 MQTT Broker：接入、路由、治理、规则、集群与可观测</text>
  <text class="tiny" x="1120" y="68" text-anchor="end">velamq-rs workspace</text>

  <rect class="node" x="70" y="126" width="190" height="74" rx="14"/>
  <text class="label" x="165" y="157" text-anchor="middle">设备接入</text>
  <text class="body" x="165" y="183" text-anchor="middle">MQTT / WS / TLS</text>

  <rect class="node" x="545" y="126" width="190" height="74" rx="14"/>
  <text class="label" x="640" y="157" text-anchor="middle">Web 控制台</text>
  <text class="body" x="640" y="183" text-anchor="middle">React 管理端</text>

  <rect class="node" x="1020" y="126" width="190" height="74" rx="14"/>
  <text class="label" x="1115" y="157" text-anchor="middle">集群节点</text>
  <text class="body" x="1115" y="183" text-anchor="middle">gRPC Fanout</text>

  <rect class="frame" x="58" y="238" width="1164" height="358" rx="22"/>
  <text class="tiny" x="88" y="271">apps/velamqd</text>
  <text class="body" x="88" y="294">启动配置、License、Broker、监听器、API 与集群协调</text>
  <line class="lane" x1="88" y1="330" x2="1192" y2="330"/>

  <rect class="core" x="110" y="360" width="250" height="120" rx="18"/>
  <text class="label" x="235" y="397" text-anchor="middle">MQTT Runtime</text>
  <text class="path" x="235" y="423" text-anchor="middle">crates/mqtt</text>
  <text class="body" x="235" y="452" text-anchor="middle">监听端点 / 协议解析</text>

  <rect class="core" x="515" y="344" width="250" height="152" rx="20"/>
  <text class="label" x="640" y="388" text-anchor="middle">Broker Core</text>
  <text class="path" x="640" y="414" text-anchor="middle">crates/broker</text>
  <text class="body" x="640" y="444" text-anchor="middle">会话 / 订阅 / 投递</text>
  <text class="body" x="640" y="469" text-anchor="middle">Retain / QoS / Metrics</text>

  <rect class="api" x="920" y="360" width="250" height="120" rx="18"/>
  <text class="label" x="1045" y="397" text-anchor="middle">Management API</text>
  <text class="path" x="1045" y="423" text-anchor="middle">crates/api</text>
  <text class="body" x="1045" y="452" text-anchor="middle">控制台 / RBAC / 审计</text>

  <path class="flow" d="M260 163 C330 163, 292 300, 235 354"/>
  <path class="flow" d="M360 420 H508"/>
  <path class="flow" d="M765 420 H914"/>
  <path class="flow" d="M640 200 V337"/>
  <path class="flow-soft" d="M1115 200 C1115 265, 1080 316, 1045 354"/>

  <rect class="support" x="110" y="520" width="250" height="58" rx="14"/>
  <text class="label" x="235" y="545" text-anchor="middle">Auth / ACL</text>
  <text class="path" x="235" y="566" text-anchor="middle">crates/auth + crates/acl</text>

  <rect class="support" x="515" y="520" width="250" height="58" rx="14"/>
  <text class="label" x="640" y="545" text-anchor="middle">Rule Engine</text>
  <text class="path" x="640" y="566" text-anchor="middle">crates/rule</text>

  <rect class="support" x="920" y="520" width="250" height="58" rx="14"/>
  <text class="label" x="1045" y="545" text-anchor="middle">Cluster / DataSource</text>
  <text class="path" x="1045" y="566" text-anchor="middle">cluster + datasource</text>

  <path class="flow-soft" d="M235 480 V514"/>
  <path class="flow-soft" d="M640 496 V514"/>
  <path class="flow-soft" d="M1045 480 V514"/>

  <rect class="storage" x="220" y="642" width="300" height="70" rx="16"/>
  <text class="label" x="370" y="672" text-anchor="middle">SQL Storage</text>
  <text class="body" x="370" y="697" text-anchor="middle">配置 / 会话 / 审计 / 指标</text>

  <rect class="external" x="760" y="642" width="300" height="70" rx="16"/>
  <text class="label" x="910" y="672" text-anchor="middle">External Systems</text>
  <text class="body" x="910" y="697" text-anchor="middle">SQL / MQ / HTTP / Redis</text>

  <path class="flow-soft" d="M640 578 C640 622, 506 620, 430 638"/>
  <path class="flow-soft" d="M640 578 C640 622, 780 620, 855 638"/>
  <path class="flow-soft" d="M1045 578 C1045 622, 974 620, 930 638"/>

  <circle class="dot" cx="360" cy="420" r="4"/>
  <circle class="dot" cx="765" cy="420" r="4"/>
  <circle class="dot" cx="640" cy="337" r="4"/>
  <circle class="dot" cx="640" cy="578" r="4"/>
</svg>
